<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome for Logout Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    
    <!-- Custom Styles -->
    <style>
        html, body {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        body {
            background-color: #f4f7fc;
            font-family: 'Roboto', sans-serif;
            color: #333;
        }

        .dashboard-header {
            background-color: #2c3e50;
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .dashboard-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
        }

        .btn-logout {
            background-color: #e74c3c;
            border: none;
            padding: 10px 20px;
            font-weight: 500;
            transition: background-color 0.3s ease;
            border-radius: 5px;
            color: white;
            text-decoration: none;
        }

        .btn-logout:hover {
            background-color: #c0392b;
        }

        .container {
            flex: 1;
            margin-top: 30px;
        }

        .card {
            border-radius: 12px;
            border: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .card-body {
            padding: 30px;
            text-align: center;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .card-text {
            font-size: 1rem;
            color: #7f8c8d;
        }

        footer {
            background-color: #f1f1f1;
            color: #7f8c8d;
            padding: 20px;
            font-size: 0.9rem;
            border-top: 1px solid #ddd;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Dashboard Header -->
    <header class="dashboard-header">
        <h1>Admin Dashboard</h1>
        <a href="{% url 'logout' %}" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </header>

    <!-- Dashboard Content -->
    <div class="container">
        <div class="row g-4">
            <!-- Dashboard Cards -->
            <div class="col-md-3">
                <div class="card shadow-sm" onclick="location.href='/teachers/';">
                    <div class="card-body">
                        <h5 class="card-title">Manage Teachers</h5>
                        <p class="card-text">Create and manage Teachers.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card shadow-sm" onclick="location.href='/tutors/';">
                    <div class="card-body">
                        <h5 class="card-title">Manage Tutors</h5>
                        <p class="card-text">Create and manage Tutors.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2025 SportsTrack. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
