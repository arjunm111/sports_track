<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ form.instance.pk|yesno:"Edit Tutor,Add Tutor" }}</title>
    <style>
        /* General Styling */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 20px;
            color: #333;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }

        input, select, textarea {
            padding: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }

        /* Button Styling */
        button {
            background-color: #1abc9c;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        button:hover {
            background-color: #16a085;
            transform: scale(1.05);
        }

        /* Link Styling */
        a {
            display: block;
            text-align: center;
            color: #3498db;
            font-size: 16px;
            text-decoration: none;
            margin-top: 20px;
        }

        a:hover {
            color: #2980b9;
        }

        /* Responsive Styling */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
                width: 90%;
            }

            h1 {
                font-size: 24px;
            }

            button {
                padding: 10px 18px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>{{ form.instance.pk|yesno:"Edit Tutor,Add Tutor" }}</h1>

        <!-- Form to Add/Edit Tutor -->
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">{{ form.instance.pk|yesno:"Save Changes,Add Tutor" }}</button>
        </form>

        <!-- Back Link -->
        <a href="{% url 'tutor_list' %}">Back to Tutors List</a>
    </div>

</body>
</html>
